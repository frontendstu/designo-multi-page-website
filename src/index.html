<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Frontend Mentor | Designo Multi-Page Website</title>

        <link
            rel="shortcut icon"
            type="image/png"
            sizes="32x32"
            href="assets/images/favicon-32x32.png"
        />
        <link rel="stylesheet" href="css/styles.css" />
    </head>
    <body>
        <header class="header">
            <div class="container">
                <div class="header__wrapper">
                    <div class="header__branding">
                        <a href="#">
                            <img
                                src="assets/images/shared/desktop/logo-dark.png"
                                alt=""
                                aria-hidden="true"
                            />

                            <h1 class="sr-only">Designo</h1>
                        </a>
                    </div>

                    <button
                        class="header__toggle"
                        aria-controls="header-nav"
                        aria-expanded="false"
                    >
                        <img
                            src="assets/images/shared/mobile/icon-hamburger.svg"
                            alt=""
                            aria-hidden="true"
                            class="menu-open-icon"
                        />

                        <img
                            src="assets/images/shared/mobile/icon-close.svg"
                            alt=""
                            aria-hidden="true"
                            class="menu-close-icon"
                        />
                        <span class="sr-only">Menu</span>
                    </button>

                    <nav class="header__menu" id="header-nav">
                        <ul role="list" class="header__menu-items">
                            <li><a href="about.html">Our company</a></li>
                            <li><a href="locations.html">Locations</a></li>
                            <li><a href="contact.html">Contact</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </header>

        <section class="hero home-hero">
            <div class="home-hero__content">
                <h2 class="heading">
                    Award-winning custom designs and digital branding solutions
                </h2>

                <div class="home-hero__content-block">
                    <p>
                        With over 10 years in the industry, we are experienced
                        in creating fully responsive websites, app design, and
                        engaging brand experiences. Find out more about our
                        services.
                    </p>

                    <a href="about.html" class="btn" data-btn-style="on-dark">
                        Learn more
                    </a>
                </div>
            </div>

            <div class="home-hero__img">
                <img
                    src="assets/images/home/desktop/image-hero-phone.svg"
                    alt="Image of an iPhone"
                />
            </div>
        </section>

        <script src="js/scripts.js"></script>
    </body>
</html>
